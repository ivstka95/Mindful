name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ────────────────────────────────────────────────────────────────────
  # gitleaks: secret scanning across full git history
  # ────────────────────────────────────────────────────────────────────
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────────────────────
  # pre-commit: run all .pre-commit-config.yaml hooks except local ones
  # (ktlint, detekt, gradle-static-analysis, forbid-main-commit are
  #  skipped — they run in the gradle job or are local-only)
  # ────────────────────────────────────────────────────────────────────
  pre-commit:
    name: pre-commit hooks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Run pre-commit (skip local Gradle hooks)
        run: |
          pip install pre-commit
          SKIP=ktlint,detekt,gradle-static-analysis,forbid-main-commit pre-commit run --all-files --show-diff-on-failure

  # ────────────────────────────────────────────────────────────────────
  # actionlint: validate workflow YAML files
  # ────────────────────────────────────────────────────────────────────
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run actionlint
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color

  # ────────────────────────────────────────────────────────────────────
  # gradle: ktlint + detekt + lint + unit tests + assemble
  # ────────────────────────────────────────────────────────────────────
  gradle:
    name: gradle (check + assembleDebug)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
          dependency-graph: generate-and-submit
          cache-provider: basic

      - name: Run check (ktlint + detekt + lint + tests)
        run: ./gradlew check --stacktrace

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: gradle-reports
          path: |
            **/build/reports/lint-results-*.html
            **/build/reports/lint-results-*.xml
            **/build/reports/detekt/
            **/build/reports/ktlint/
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload debug APK
        if: success() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
