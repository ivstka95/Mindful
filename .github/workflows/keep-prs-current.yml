name: keep-prs-current

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: keep all open PRs current with main
    runs-on: ubuntu-latest
    steps:
      # The GitHub update-branch API does a server-side merge of main into the
      # PR branch — equivalent to clicking "Update branch" on the PR page.
      # PRs with conflicts return a non-2xx status; errors are swallowed so
      # conflicting PRs are silently skipped (human resolution required).
      # Dependabot-owned branches are excluded: GitHub rejects update-branch
      # calls on them regardless of who makes the request.
      - name: Update non-Dependabot PRs via update-branch API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          prs=$(gh pr list --repo "$GITHUB_REPOSITORY" \
            --base main --state open \
            --json number,author,title \
            --jq '.[] | select(.author.login != "app/dependabot") | "\(.number) \(.title)"')

          if [[ -z "$prs" ]]; then
            echo "No non-Dependabot PRs open — nothing to update."
          else
            while IFS=' ' read -r pr rest; do
              if gh api --method PUT \
                --header "Accept: application/vnd.github+json" \
                "repos/$GITHUB_REPOSITORY/pulls/$pr/update-branch" >/dev/null 2>&1; then
                echo "PR #$pr: update requested — $rest"
              else
                echo "PR #$pr: skipped (conflicts, already current, or not updateable) — $rest"
              fi
            done <<< "$prs"
          fi

      # @dependabot rebase triggers a server-side rebase by the Dependabot bot.
      # For BEHIND PRs it simply rebases on top of main.
      # For DIRTY PRs (conflicts) Dependabot attempts auto-resolution; if it
      # can't, it comments "unable to rebase" and leaves the PR for manual review.
      #
      # We use the compare API (ahead_by = commits in main not in the PR branch)
      # instead of mergeStateStatus, which GitHub computes asynchronously and
      # can stay UNKNOWN indefinitely after a push to main.
      - name: Comment @dependabot rebase on stale Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          dep_prs=$(gh pr list --repo "$GITHUB_REPOSITORY" --author "app/dependabot" \
            --state open \
            --json number,title,headRefName \
            --jq '.[] | "\(.number) \(.headRefName) \(.title)"')

          if [[ -z "$dep_prs" ]]; then
            echo "No Dependabot PRs open."
          else
            while IFS=' ' read -r pr branch rest; do
              behind=$(gh api "repos/$GITHUB_REPOSITORY/compare/${branch}...main" \
                --jq '.ahead_by' 2>/dev/null || echo "error")
              if [[ "$behind" == "error" ]]; then
                echo "PR #$pr: could not compare branch — skipping ($rest)"
              elif [[ "$behind" -gt 0 ]]; then
                echo "PR #$pr: ${behind} commit(s) behind main — requesting rebase ($rest)"
                gh pr comment "$pr" --repo "$GITHUB_REPOSITORY" --body "@dependabot rebase"
              else
                echo "PR #$pr: up-to-date — skipping ($rest)"
              fi
            done <<< "$dep_prs"
          fi
