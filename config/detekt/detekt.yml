build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

complexity:
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 8
    ignoreDefaultParameters: true
    ignoreDataClasses: true
    ignoreAnnotatedParameter:
      - 'androidx.compose.runtime.Composable'
  LongMethod:
    threshold: 80
  TooManyFunctions:
    thresholdInClasses: 20
    thresholdInObjects: 20
    ignoreOverridden: true
  CyclomaticComplexMethod:
    threshold: 20

style:
  ForbiddenImport:
    active: true
    imports:
      - value: 'androidx.compose.material.**'
        reason: 'Material 2 is forbidden. Use androidx.compose.material3.**.'
      - value: 'java.time.**'
        reason: 'java.time is forbidden by CLAUDE.md. Use kotlinx.datetime.'
      - value: 'java.util.Date'
        reason: 'Use kotlinx.datetime.Instant or LocalDateTime.'
      - value: 'java.text.SimpleDateFormat'
        reason: 'Use kotlinx.datetime formatting.'
  MagicNumber:
    excludes:
      - '**/*Test.kt'
      - '**/*Spec.kt'
      - '**/*Preview*.kt'
      - '**/test/**'
      - '**/androidTest/**'
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
      - '100'
      - '1000'
    ignorePropertyDeclaration: true
    ignoreLocalVariableDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreAnnotation: true
    ignoreEnums: true
  MaxLineLength:
    maxLineLength: 140
    excludePackageStatements: true
    excludeImportStatements: true
    excludeCommentStatements: true
  ReturnCount:
    max: 4
  UnusedPrivateMember:
    allowedNames: 'preview.*|Preview.*|.*Preview'
  ForbiddenComment:
    active: false
  WildcardImport:
    active: true
    excludeImports:
      - 'java.util.*'

naming:
  FunctionNaming:
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
    excludes:
      - '**/test/**'
      - '**/androidTest/**'
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][_A-Z0-9]*|[A-Z][a-zA-Z0-9]*'

empty-blocks:
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true

# Compose-specific rules from io.nlopez.compose.rules
# Documentation: https://mrmans0n.github.io/compose-rules/
Compose:
  ComposableAnnotationNaming:
    active: true
  ComposableNaming:
    active: true
  ComposableParamOrder:
    active: true
  CompositionLocalAllowlist:
    active: false
  CompositionLocalNaming:
    active: true
  ContentEmitterReturningValues:
    active: true
  Material2:
    active: true
  ModifierComposed:
    active: true
  ModifierMissing:
    active: true
  ModifierNaming:
    active: true
  ModifierNotUsedAtRoot:
    active: true
  ModifierReused:
    active: true
  ModifierWithoutDefault:
    active: true
  MultipleEmitters:
    active: true
  MutableParams:
    active: true
  ParameterNaming:
    active: true
  PreviewAnnotationNaming:
    active: true
  PreviewNaming:
    active: true
  PreviewPublic:
    active: true
  RememberContentMissing:
    active: true
  RememberMissing:
    active: true
  UnstableCollections:
    active: true
  ViewModelForwarding:
    active: true
  ViewModelInjection:
    active: true
