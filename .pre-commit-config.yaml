repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-xml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-symlinks
      - id: check-executables-have-shebangs
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: 'gradlew\.bat'

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: forbid-main-commit
        name: forbid commits on main/master
        entry: scripts/forbid-main-commit.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: gradle-static-analysis
        name: detekt + ktlintCheck
        entry: ./gradlew detekt ktlintCheck --quiet
        language: system
        pass_filenames: false
        files: \.(kt|kts)$
        stages: [pre-commit]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
