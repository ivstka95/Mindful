repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: forbid-main-commit
        name: forbid commits on main/master
        entry: scripts/forbid-main-commit.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: gradle-static-analysis
        name: detekt + ktlintCheck
        entry: ./gradlew detekt ktlintCheck --quiet
        language: system
        pass_filenames: false
        files: \.(kt|kts)$
        stages: [pre-commit]
